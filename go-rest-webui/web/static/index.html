<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikrousługa — Panel</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="dot" id="healthDot"></span>
        <h1>Mikrousługa <span class="brand-sub">// panel</span></h1>
      </div>
      <div class="topbar-actions">
        <span class="badge" id="uptimeBadge">uptime: --</span>
      </div>
    </header>

    <main class="grid">
      <!-- Status cards -->
      <section class="cards">
        <div class="card">
          <div class="card-label">Requesty</div>
          <div class="card-value" id="statRequests">0</div>
        </div>
        <div class="card">
          <div class="card-label">Elementy</div>
          <div class="card-value" id="statItems">0</div>
        </div>
        <div class="card">
          <div class="card-label">Goroutines</div>
          <div class="card-value" id="statGoroutines">0</div>
        </div>
        <div class="card">
          <div class="card-label">Pamięć (MB)</div>
          <div class="card-value" id="statMem">0</div>
        </div>
      </section>

      <!-- Items panel -->
      <section class="panel">
        <div class="panel-header">
          <h2>Elementy</h2>
          <form id="createForm" class="inline-form">
            <input type="text" id="newName" placeholder="Nazwa..." required>
            <select id="newStatus">
              <option value="nowy">nowy</option>
              <option value="w toku">w toku</option>
              <option value="gotowe">gotowe</option>
            </select>
            <button type="submit">+ Dodaj</button>
          </form>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nazwa</th>
                <th>Status</th>
                <th>Utworzono</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemsBody">
              <tr><td colspan="5" class="empty">Ładowanie…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Log panel -->
      <section class="panel">
        <div class="panel-header">
          <h2>Log zdarzeń</h2>
          <button id="clearLog" class="ghost-btn">Wyczyść</button>
        </div>
        <div class="log" id="logBox"></div>
      </section>
    </main>

    <footer class="footer">
      <span id="goVersion">Go</span> · odświeżanie co 3s
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
